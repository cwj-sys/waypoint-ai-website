<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 170" width="160" height="170" role="img">
  <title>Waypoint AI — stacked logo</title>

  <!-- Icon mark (centred) -->
  <g transform="translate(80, 70)">
    <circle cx="0" cy="0" r="48" fill="#0e8f7a" opacity="0.15"/>
    <circle cx="0" cy="0" r="40" fill="#0e8f7a"/>
    <circle cx="0" cy="0" r="25" fill="#0f2240"/>
    <polyline points="-10,-8 -6.5,10 0,1 6.5,10 10,-8"
              fill="none" stroke="#ffffff" stroke-width="3.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-48" x2="0" y2="-38" stroke="#4dd9c8" stroke-width="3" stroke-linecap="round"/>
    <line x1="48" y1="0" x2="38" y2="0" stroke="#4dd9c8" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="48" x2="0" y2="38" stroke="#4dd9c8" stroke-width="3" stroke-linecap="round"/>
    <line x1="-48" y1="0" x2="-38" y2="0" stroke="#4dd9c8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Wordmark (centred below) -->
  <text x="80" y="138"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="800" fill="#0f2240"
        text-anchor="middle" letter-spacing="-0.3">Waypoint</text>
  <text x="80" y="163"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="800" fill="#0e8f7a"
        text-anchor="middle" letter-spacing="3">AI</text>
</svg>
