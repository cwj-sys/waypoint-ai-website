<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img">
  <title>Waypoint AI — horizontal logo</title>

  <!-- Icon mark -->
  <g transform="translate(36, 36)">
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="34" fill="#0e8f7a" opacity="0.18"/>
    <!-- Teal ring -->
    <circle cx="0" cy="0" r="28" fill="#0e8f7a"/>
    <!-- Navy inner circle -->
    <circle cx="0" cy="0" r="17" fill="#0f2240"/>
    <!-- W letterform -->
    <polyline points="-7,-5.5 -4.5,7 0,0.5 4.5,7 7,-5.5"
              fill="none" stroke="#ffffff" stroke-width="2.8"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Compass tick marks -->
    <line x1="0" y1="-34" x2="0" y2="-26" stroke="#4dd9c8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="34" y1="0" x2="26" y2="0" stroke="#4dd9c8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="34" x2="0" y2="26" stroke="#4dd9c8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-34" y1="0" x2="-26" y2="0" stroke="#4dd9c8" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="82" y="30"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="23" font-weight="800" fill="#0f2240"
        letter-spacing="-0.3">Waypoint</text>
  <text x="82" y="57"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="23" font-weight="800" fill="#0e8f7a"
        letter-spacing="2">AI</text>
</svg>
